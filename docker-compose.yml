services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cobranzas-backend
    restart: unless-stopped
    environment:
      COBRANZAS_CORS_ORIGIN_REGEX: ${BACKEND_CORS_REGEX:-^https?://.*$}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - cobranzas_backend_data:/app/backend/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: cobranzas-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-8080}:3000"
    depends_on:
      - backend

volumes:
  cobranzas_backend_data:
