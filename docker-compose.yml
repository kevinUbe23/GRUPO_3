services:
  proxy:
    image: caddy:2-alpine
    container_name: cobranzas-proxy
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
    command: |
      cat > /etc/caddy/Caddyfile <<'EOF'
      :80 {
        handle /api/* {
          reverse_proxy backend:8000
        }

        handle {
          reverse_proxy frontend:3000
        }
      }
      EOF
      caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - frontend
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cobranzas-backend
    restart: unless-stopped
    environment:
      COBRANZAS_CORS_ORIGIN_REGEX: ${BACKEND_CORS_REGEX:-^https?://(localhost|127\.0\.0\.1)(:\d+)?$}
    volumes:
      - cobranzas_backend_data:/app/backend/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api/v1}
    container_name: cobranzas-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api/v1}
    depends_on:
      - backend

volumes:
  cobranzas_backend_data:
