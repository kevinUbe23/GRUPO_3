services:
  - type: web
    name: cobranzas-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: COBRANZAS_CORS_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$
